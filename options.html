<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeSifter Options</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #475569;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        --red: #dc2626;
        --red-dark: #b91c1c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial;
        background: linear-gradient(180deg, #fff 0%, #fff7f7 100%);
        color: var(--fg);
      }
      .wrap {
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 14px;
        color: var(--muted);
      }
      label {
        display: block;
        font-weight: 650;
        margin-bottom: 8px;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        outline: none;
        font: inherit;
      }
      input[type="password"]:focus,
      input[type="text"]:focus {
        border-color: rgba(220, 38, 38, 0.45);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.10);
      }
      button {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(220, 38, 38, 0.25);
        background: #fff;
        color: var(--red-dark);
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      button:hover {
        border-color: rgba(220, 38, 38, 0.55);
      }
      .subrow {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
      }
      .status {
        margin-left: auto;
        font-weight: 650;
        color: var(--muted);
      }
      .status[data-variant="ok"] {
        color: #166534;
      }
      .status[data-variant="error"] {
        color: #7f1d1d;
      }
      .note {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }
      code {
        background: rgba(15, 23, 42, 0.06);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>VibeSifter Options</h1>
        <p>
          ""Save your OpenAI API key locally for this extension.""
        </p>

        <label for="apiKey">OpenAI API Key</label>
        <div class="row">
          <input
            id="apiKey"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-..."
          />
          <button id="toggle" type="button" title="Show/Hide">
            Show
          </button>
          <button id="save" type="button">Save</button>
        </div>

        <label for="affiliateId" style="margin-top: 12px;">Booking Affiliate ID</label>
        <div class="row">
          <input
            id="affiliateId"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="e.g. 304142"
          />
        </div>

        <div class="subrow">
          <button id="clear" type="button">Clear</button>
          <div id="status" class="status" aria-live="polite"></div>
        </div>

        <div class="note">
          Stored in <code>chrome.storage.local</code> under keys <code>openai_key</code> and <code>affiliate_id</code>.
          Never pasted into the console.
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
